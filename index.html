<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kipas Angin 3D Realistis (Diperbaiki)</title>
    <style>
        /* === BAGIAN CSS (TAMPILAN & ANIMASI) === */
        
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
        }

        h2 { margin-bottom: 5px; }

        #fan-system {
            transition: 0.5s all; 
            margin: 0 auto 30px auto;
            width: fit-content;
            perspective: 1000px; 
        }

        .ceiling-rod, .wall-bracket, .stand-pole, .stand-base {
            display: none; 
            background-color: #6c757d;
        }

        .type-stand { display: flex; flex-direction: column; align-items: center; margin-top: 30px !important; }
        .type-stand .stand-pole { display: block; width: 25px; height: 120px; margin-top: -15px; z-index: -1; }
        .type-stand .stand-base { display: block; width: 160px; height: 25px; border-radius: 15px 15px 0 0; background-color: #495057; }

        .type-ceiling { display: flex; flex-direction: column; align-items: center; margin-top: 0 !important; }
        .type-ceiling .ceiling-rod { display: block; width: 20px; height: 100px; margin-bottom: -15px; z-index: -1;}

        .type-wall { display: flex; align-items: center; margin-top: 50px !important; margin-left: 20px !important; }
        .type-wall .wall-bracket { display: block; width: 100px; height: 35px; margin-right: -15px; z-index: -1; border-radius: 10px 0 0 10px; background-color: #495057; }

        .fan-container {
            width: 200px;
            height: 200px;
            border: 12px solid #495057; 
            border-radius: 50%; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(248, 249, 250, 0.6); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3); 
            z-index: 2;
            transform-style: preserve-3d; 
        }

        .motor {
            position: absolute;
            width: 70px;
            height: 90px;
            background-color: #343a40;
            border-radius: 40px;
            transform: translateZ(-50px);
        }

        .blades-wrapper { 
            width: 100%; height: 100%; position: relative; 
            /* Posisi awal baling-baling didorong ke depan */
            transform: translateZ(10px);
        }

        .blade {
            position: absolute;
            width: 25px;
            height: 90px;
            background-color: #0d6efd; 
            top: 10px;
            left: 87.5px; 
            border-radius: 50% 50% 10% 10%; 
            transform-origin: center 90px; 
            box-shadow: 2px 5px 5px rgba(0,0,0,0.3);
        }

        .blade:nth-child(1) { transform: rotate(0deg); }
        .blade:nth-child(2) { transform: rotate(120deg); }
        .blade:nth-child(3) { transform: rotate(240deg); }

        .center-dot {
            width: 35px;
            height: 35px;
            background-color: #212529;
            border-radius: 50%;
            position: absolute;
            transform: translateZ(20px);
        }

        @keyframes swingAnimation {
            0%, 100% { transform: rotateY(-45deg); } 
            50% { transform: rotateY(45deg); } 
        }

        .swinging {
            animation: swingAnimation 4s ease-in-out infinite;
            transform-origin: bottom center; 
        }

        /* --- PERBAIKAN DI SINI: Animasi Spin Menggabungkan translateZ dan rotate --- */
        @keyframes spin { 
            0% { transform: translateZ(10px) rotate(0deg); }
            100% { transform: translateZ(10px) rotate(360deg); } 
        }

        .speed-1 { animation: spin 1.0s linear infinite; } 
        .speed-2 { animation: spin 0.8s linear infinite; }
        .speed-3 { animation: spin 0.6s linear infinite; }
        .speed-4 { animation: spin 0.4s linear infinite; } 
        .speed-5 { animation: spin 0.2s linear infinite; }
        .speed-6 { animation: spin 0.1s linear infinite; }
        .speed-7 { animation: spin 0.04s linear infinite; } 

        .control-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 8px 15px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:active { transform: scale(0.95); }
        button.off { background-color: #dc3545; color: white; }
        button.on { background-color: #198754; color: white; }
        button.type-btn { background-color: #0dcaf0; color: black; }
        button.swing-btn { background-color: #ffc107; color: black; } 
    </style>
</head>
<body>

    <h2>Kipas Angin 3D (Diperbaiki)</h2>

    <div id="fan-system" class="type-stand">
        <div class="ceiling-rod"></div>
        <div class="wall-bracket"></div>
        
        <div id="fan-head" class="fan-container">
            <div class="motor"></div>

            <div id="fan-blades" class="blades-wrapper">
                <div class="blade"></div>
                <div class="blade"></div>
                <div class="blade"></div>
            </div>
            <div class="center-dot"></div>
        </div>

        <div class="stand-pole"></div>
        <div class="stand-base"></div>
    </div>

    <div class="control-panel">
        <h3>Mode & Jenis:</h3>
        <div class="controls">
            <button class="type-btn" onclick="changeType('type-stand')">Kipas Duduk</button>
            <button class="type-btn" onclick="changeType('type-ceiling')">Kipas Atap</button>
            <button class="type-btn" onclick="changeType('type-wall')">Kipas Dinding</button>
            <button id="btn-swing" class="swing-btn" onclick="toggleSwing()">Geleng: OFF</button>
        </div>

        <hr style="border-top: 1px solid #ddd;">

        <h3>Kecepatan:</h3>
        <div class="controls">
            <button class="off" onclick="changeSpeed('off', 0)">Mati</button>
            <button class="on" onclick="changeSpeed('speed-1', 1)">1</button>
            <button class="on" onclick="changeSpeed('speed-2', 2)">2</button>
            <button class="on" onclick="changeSpeed('speed-3', 3)">3</button>
            <button class="on" onclick="changeSpeed('speed-4', 4)">4</button>
            <button class="on" onclick="changeSpeed('speed-5', 5)">5</button>
            <button class="on" onclick="changeSpeed('speed-6', 6)">6</button>
            <button class="on" onclick="changeSpeed('speed-7', 7)">7</button>
        </div>
    </div>

    <audio id="audio-tombol" src="suara-tombol.mp3"></audio>
    <audio id="audio-kipas" src="suara-kipas.mp3" loop></audio>

    <script>
        const fanBlades = document.getElementById('fan-blades');
        const fanSystem = document.getElementById('fan-system'); 
        const fanHead = document.getElementById('fan-head'); 
        const audioTombol = document.getElementById('audio-tombol');
        const audioKipas = document.getElementById('audio-kipas');
        const btnSwing = document.getElementById('btn-swing');

        let isSwinging = false;

        function changeSpeed(speedClass, level) {
            audioTombol.currentTime = 0; 
            audioTombol.play(); 
            fanBlades.className = 'blades-wrapper';

            if (speedClass === 'off') {
                audioKipas.pause();
            } else {
                fanBlades.classList.add(speedClass);
                audioKipas.play();
                audioKipas.playbackRate = 0.8 + (level * 0.2); 
            }
        }

        function changeType(typeClass) {
            audioTombol.currentTime = 0; 
            audioTombol.play(); 
            fanSystem.className = typeClass;
        }

        function toggleSwing() {
            audioTombol.currentTime = 0; 
            audioTombol.play(); 

            isSwinging = !isSwinging;

            if (isSwinging) {
                fanHead.classList.add('swinging');
                btnSwing.innerText = 'Geleng: ON';
                btnSwing.style.backgroundColor = '#20c997'; 
            } else {
                fanHead.classList.remove('swinging');
                btnSwing.innerText = 'Geleng: OFF';
                btnSwing.style.backgroundColor = '#ffc107'; 
            }
        }
    </script>

</body>
</html>
